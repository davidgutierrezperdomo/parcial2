<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medico</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; max-width: 400px; padding: 8px; box-sizing: border-box; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-cancel { background-color: #dc3545; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
<h1>Medico</h1>
<form th:action="@{/medicos/guardar}" th:object="${medico}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="form-group">
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" maxlength="100" required>
    </div>

    <button type="submit" class="btn-save">Guardar medico</button>
    <a th:href="@{/medicos}" class="btn-cancel">Cancelar</a>
</form>
</body>
</html>
