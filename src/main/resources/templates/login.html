<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesion</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e9ecef; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
        label { text-align: left; display: block; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Acceso al Sistema</h2>
    <div th:if="${param.error}" class="error">Credenciales incorrectas.</div>

    <form th:action="@{/login}" method="post">
        <label>Usuario:</label>
        <input type="text" name="username" placeholder="ADMIN-999, MED-101 o PAC-001" required>

        <label>Contrasena:</label>
        <input type="password" name="password" required>

        <button type="submit">Entrar</button>
    </form>
</div>
</body>
</html>
