<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity">
<head>
  <meta charset="UTF-8">
  <title>Consultas</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background-color: #0056b3; color: white; }
    .btn { padding: 8px 12px; text-decoration: none; border-radius: 4px; color: white; font-weight: bold; display: inline-block; font-size: 13px; border: none; cursor: pointer; }
    .btn-edit { background-color: #ffc107; color: black; }
    .btn-delete { background-color: #dc3545; }
    .btn-add { background-color: #28a745; margin-bottom: 20px; }
    .btn-secondary { background-color: #0056b3; margin-bottom: 20px; }
    .btn-logout { background-color: #6c757d; padding: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .user-info { font-size: 14px; color: #555; }
    .actions { display: flex; gap: 8px; }
  </style>
</head>
<body>
<div class="header">
  <div>
    <h1>Consultas Medicas</h1>
    <p class="user-info">
      Usuario: <b sec:authentication="name">Usuario</b>
      (Rol: <span sec:authentication="principal.authorities">ROL</span>)
    </p>
  </div>
  <form th:action="@{/logout}" method="post">
    <button type="submit" class="btn btn-logout">Cerrar sesion</button>
  </form>
</div>

<br>
<div sec:authorize="hasRole('ADMINISTRADOR')" class="actions">
  <a th:href="@{/consultas/nuevo}" class="btn btn-add">Agregar consulta</a>
  <a th:href="@{/medicos}" class="btn btn-secondary">Gestionar medicos</a>
</div>

<table>
  <thead>
  <tr>
    <th>Paciente</th>
    <th>Motivo</th>
    <th>Consultorio</th>
    <th>Horario</th>
    <th>Medico</th>
    <th sec:authorize="hasAnyRole('ADMINISTRADOR', 'PACIENTE')">Acciones</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="consulta : ${listaConsultas}">
    <td th:text="${consulta.nombrePaciente}" style="font-weight: bold;"></td>
    <td th:text="${consulta.motivoConsulta}"></td>
    <td th:text="${consulta.numeroConsultorio}"></td>
    <td>
      <span th:text="${consulta.horaInicio}"></span> - <span th:text="${consulta.horaFin}"></span>
    </td>
    <td th:text="${consulta.medico != null ? consulta.medico.nombre : 'Sin asignar'}"></td>
    <td sec:authorize="hasAnyRole('ADMINISTRADOR', 'PACIENTE')">
      <div class="actions">
        <a class="btn btn-edit" th:href="@{/consultas/editar/{id}(id=${consulta.id})}"
           sec:authorize="hasRole('ADMINISTRADOR')">Editar</a>
        <a class="btn btn-delete" th:href="@{/consultas/eliminar/{id}(id=${consulta.id})}"
           onclick="return confirm('Seguro que deseas eliminar esta consulta?')"
           sec:authorize="hasRole('ADMINISTRADOR')">Eliminar</a>
        <a class="btn btn-edit" th:href="@{/consultas/editar/{id}(id=${consulta.id})}"
           sec:authorize="hasRole('PACIENTE')">Actualizar horario</a>
      </div>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
